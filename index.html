<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan2Pass - Study Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        function StudyPilotApp() {
            // Exam State
            const [exams, setExams] = React.useState([]);
            const [newExam, setNewExam] = React.useState({ name: '', date: '', priority: 'Medium' });

            // Subject State
            const [subjects, setSubjects] = React.useState([]);
            const [newSubject, setNewSubject] = React.useState({ name: '', theory: '', practice: '' });

            const addExam = () => {
                if (newExam.name && newExam.date) {
                    setExams([...exams, { ...newExam, id: Date.now() }]);
                    setNewExam({ name: '', date: '', priority: 'Medium' });
                }
            };

            const addSubject = () => {
                if (newSubject.name) {
                    setSubjects([...subjects, { ...newSubject, id: Date.now() }]);
                    setNewSubject({ name: '', theory: '', practice: '' });
                }
            };

            return (
                <div class="max-w-4xl mx-auto p-6 space-y-10">
                    <h1 class="text-3xl font-bold text-slate-800">Plan2Pass Dashboard</h1>
                    
                    {/* Exam Manager Section */}
                    <div class="bg-white p-6 rounded-xl shadow-md">
                        <h2 class="text-xl font-semibold mb-4 text-blue-600">1. Exam Management</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <input placeholder="Exam Name" class="p-3 border rounded-lg" value={newExam.name} onChange={(e) => setNewExam({...newExam, name: e.target.value})} />
                            <input type="date" class="p-3 border rounded-lg" value={newExam.date} onChange={(e) => setNewExam({...newExam, date: e.target.value})} />
                            <select class="p-3 border rounded-lg" value={newExam.priority} onChange={(e) => setNewExam({...newExam, priority: e.target.value})}>
                                <option>High</option><option>Medium</option><option>Low</option>
                            </select>
                        </div>
                        <button onClick={addExam} class="mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700">Add Exam</button>
                        
                        <div class="mt-6 space-y-2">
                            {exams.map(e => <div key={e.id} class="p-3 bg-slate-50 rounded border-l-4 border-blue-500 font-medium">{e.name} ({e.date})</div>)}
                        </div>
                    </div>

                    {/* Subject Manager Section */}
                    <div class="bg-white p-6 rounded-xl shadow-md">
                        <h2 class="text-xl font-semibold mb-4 text-emerald-600">2. Subject Management</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <input placeholder="Subject Name (e.g., Control Systems)" class="p-3 border rounded-lg" value={newSubject.name} onChange={(e) => setNewSubject({...newSubject, name: e.target.value})} />
                            <input placeholder="Theory Source (YouTube URL)" class="p-3 border rounded-lg" value={newSubject.theory} onChange={(e) => setNewSubject({...newSubject, theory: e.target.value})} />
                            <input placeholder="Practice Hours" class="p-3 border rounded-lg" value={newSubject.practice} onChange={(e) => setNewSubject({...newSubject, practice: e.target.value})} />
                        </div>
                        <button onClick={addSubject} class="mt-4 w-full bg-emerald-600 text-white py-2 rounded-lg font-bold hover:bg-emerald-700">Add Subject</button>
                        
                        <div class="mt-6 grid gap-4">
                            {subjects.map(s => (
                                <div key={s.id} class="p-4 bg-emerald-50 rounded-lg border border-emerald-100">
                                    <h3 class="font-bold text-lg text-emerald-900">{s.name}</h3>
                                    <p class="text-sm text-emerald-700">Theory: {s.theory || 'N/A'}</p>
                                    <p class="text-sm text-emerald-700">Practice: {s.practice || 'N/A'}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StudyPilotApp />);
    </script>
</body>
</html>
