<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan2Pass - Study Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        function StudyPilotApp() {
            const [exams, setExams] = React.useState([]);
            const [subjects, setSubjects] = React.useState([]);
            const [availability, setAvailability] = React.useState({ Mon: '', Tue: '', Wed: '', Thu: '', Fri: '', Sat: '', Sun: '' });

            const handleAvailabilityChange = (day, value) => {
                setAvailability({...availability, [day]: value});
            };

            return (
                <div class="max-w-4xl mx-auto p-6 space-y-10">
                    <h1 class="text-3xl font-bold text-slate-800">Plan2Pass Dashboard</h1>
                    
                    {/* Weekly Availability Section */}
                    <div class="bg-white p-6 rounded-xl shadow-md">
                        <h2 class="text-xl font-semibold mb-4 text-purple-600">3. Weekly Availability (Hours)</h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            {Object.keys(availability).map(day => (
                                <div key={day} class="flex flex-col">
                                    <label class="text-sm font-medium text-slate-600 mb-1">{day}</label>
                                    <input 
                                        type="number" 
                                        placeholder="Hrs" 
                                        class="p-2 border rounded-lg"
                                        value={availability[day]}
                                        onChange={(e) => handleAvailabilityChange(day, e.target.value)}
                                    />
                                </div>
                            ))}
                        </div>
                        <p class="text-sm text-slate-500 mt-4 italic">Set your available study hours for each day of the week.</p>
                    </div>

                    {/* Summary Section (Reflected) */}
                    <div class="bg-indigo-50 p-6 rounded-xl border border-indigo-100">
                        <h2 class="text-lg font-bold text-indigo-900 mb-2">Weekly Goal Preview</h2>
                        <p class="text-indigo-700">You have set your availability. This will be used to calculate your study plan once we enable the Planning Engine.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<StudyPilotApp />);
    </script>
</body>
</html>
